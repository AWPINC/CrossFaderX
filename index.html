<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossFaderX - Adaptive Audio Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="control-panel">
            <div class="input-group">
                <label for="file-upload" class="custom-file-upload">
                    Загрузить треки (Stems)
                </label>
                <input type="file" id="file-upload" multiple accept="audio/*">
            </div>
            
            <div class="input-group">
                <label for="fade-time">Время перехода (сек):</label>
                <input type="number" id="fade-time" value="2.0" step="0.1" min="0.1">
            </div>

            <button id="master-btn" class="master-btn" disabled>Play</button>
        </header>

        <main id="track-container" class="tracks-grid">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
