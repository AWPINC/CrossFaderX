<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossFaderX - Fast Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="control-panel">
            <div class="input-group">
                <label for="file-upload" class="custom-file-upload">Загрузить стемы</label>
                <input type="file" id="file-upload" multiple accept="audio/*">
            </div>

            <div class="transport-controls">
                <button id="stop-btn" class="transport-btn stop" disabled>Stop</button>
                <button id="play-pause-btn" class="transport-btn play" disabled>Play</button>
            </div>
            
            <div class="input-group">
                <label for="fade-time">Кроссфейд (сек):</label>
                <input type="number" id="fade-time" value="2.0" step="0.1" min="0.1">
            </div>

            <div class="mode-switch">
                <button id="mode-play" class="mode-btn active">Слушать</button>
                <button id="mode-manage" class="mode-btn">Двигать</button>
            </div>
        </header>

        <div id="global-progress-container" class="global-progress">
            <div id="global-progress-fill" class="progress-fill"></div>
            <div id="global-playhead" class="progress-knob"></div>
        </div>

        <main id="track-container" class="tracks-grid">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
