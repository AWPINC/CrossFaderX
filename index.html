<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossFaderX - Advanced Stem Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="control-panel">
            <!-- Строка 1 -->
            <div class="panel-row">
                <div class="input-group">
                    <label for="file-upload" class="custom-file-upload">Загрузить стемы</label>
                    <input type="file" id="file-upload" multiple accept="audio/*">
                    <button id="add-group-btn" class="custom-btn">Новая группа</button>
                </div>

                <div class="transport-controls">
                    <button id="global-play-btn" class="transport-btn play" title="Play / Pause">▶</button>
                    <button id="global-stop-btn" class="transport-btn stop" title="Stop All">⏹</button>
                </div>
            </div>

            <!-- Строка 2 -->
            <div class="panel-row">
                <div class="input-group">
                    <label>Режим микса:</label>
                    <div class="mode-switch">
                        <button id="mix-single" class="mode-btn active">Соло</button>
                        <button id="mix-multi" class="mode-btn">Мульти</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="fade-time">Кроссфейд (с):</label>
                    <input type="number" id="fade-time" value="1.0" step="0.1" min="0.1">
                </div>

                <div class="mode-switch">
                    <button id="mode-play" class="mode-btn active">Слушать</button>
                    <button id="mode-manage" class="mode-btn">Двигать</button>
                </div>

                <div class="dynamic-slider-container">
                    <div id="volume-settings" class="input-group">
                        <label for="master-volume">Громкость:</label>
                        <input type="range" id="master-volume" min="0" max="1" step="0.01" value="1">
                        <span id="volume-val">100%</span>
                    </div>

                    <div id="grid-settings" class="input-group" style="display: none;">
                        <label for="column-count">Колонки:</label>
                        <input type="range" id="column-count" min="1" max="10" value="4">
                        <span id="column-val">4</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Контейнер для динамических групп -->
        <main id="groups-container" class="groups-container">
            <!-- Группы будут появляться здесь при загрузке или создании -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
